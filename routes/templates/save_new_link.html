<div class="card bg-secondary bg-opacity-10 border-secondary p-4">
    <h5 class="card-title mb-3 text-primary">Save a New Link</h5>
    <form>
        <div class="mb-3">
            <label for="linkUrl" class="form-label text-secondary small">URL / Address</label>
            <input type="url" class="form-control bg-dark text-light border-secondary" id="linkUrl" placeholder="" required>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="linkTitle" class="form-label text-secondary small">Title / Name</label>
                <input type="text" class="form-control bg-dark text-light border-secondary" id="linkTitle" placeholder="e.g., Python Docs">
            </div>
            <div class="col-md-6 mb-3">
                <label for="linkCategory" class="form-label text-secondary small">Category / Tag</label>
                <input type="text" class="form-control bg-dark text-light border-secondary" id="linkCategory" placeholder="e.g., Tutorials">
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-2">
            <i class="bi bi-plus-circle me-2"></i>Save Link
        </button>
    </form>
</div>
